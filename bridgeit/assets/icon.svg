<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Subtle drop shadow for depth -->
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <!-- Rail gradient: dark steel feel -->
    <linearGradient id="rail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8d6e8"/>
      <stop offset="100%" stop-color="#8fa8c4"/>
    </linearGradient>
    <!-- Bridge tab gradient: orange accent -->
    <linearGradient id="tab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#e05a00"/>
    </linearGradient>
    <!-- Background gradient: dark navy -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#111820"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Top rail -->
  <rect x="56" y="170" width="400" height="56" rx="14" fill="url(#rail)" filter="url(#shadow)"/>

  <!-- Bottom rail -->
  <rect x="56" y="290" width="400" height="56" rx="14" fill="url(#rail)" filter="url(#shadow)"/>

  <!-- Bridge tab — centred, spans both rails, orange accent -->
  <rect x="210" y="170" width="92" height="176" rx="10" fill="url(#tab)" filter="url(#shadow)"/>

  <!-- Subtle highlight on tab top edge -->
  <rect x="210" y="170" width="92" height="18" rx="10" fill="#ffb070" opacity="0.5"/>

  <!-- Small dots at bridge attachment points for recognition at small sizes -->
  <circle cx="256" cy="173" r="14" fill="#ffb070" opacity="0.6"/>
  <circle cx="256" cy="343" r="14" fill="#ffb070" opacity="0.6"/>
</svg>
